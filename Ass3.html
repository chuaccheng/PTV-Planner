<script type="text/javascript">
	
// Load my mapbox map style using my map access code
mapboxgl.accessToken = 'pk.eyJ1Ijoic3BhdGlhbGcyIiwiYSI6ImNrMW9jcWM2ZDBqaG0zb25xN2JpdHBrYmUifQ.p8XUepeFG18AhKTDgC8Vow';

var map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/spatialg2/ck1odux5b0yo41clcma5gam2f',
  center: [144.96, -37.8157],
  zoom: 14
});



map.on('load', function () {
  map.addSource('tramroutes', {
    type: 'vector',
    url: 'mapbox://spatialg2.359uagp2'
  });
map.addLayer({
  'id': 'tramroutes',
  'type': 'line',
  'source': 'tramroutes',
  'layout': {
  'visibility': 'visible'
},
'paint': {
  'line-colour': 'green',
  'line-width': '1',
},
'source-layer': 'SDM648670-3oocgl'
});
 


map.addSource('trainstops', {
    type: 'vector',
    url: 'mapbox://spatialg2.6a56qcyh'
  });

map.addLayer({
'id': 'trainstops',
'type': 'circle',
'source': 'trainstops',
'layout': {
'visibility': 'visible'
},
'paint': {
'circle-radius': 8,
'circle-color': 'blue'
},
'source-layer': 'SDM645378-dyxplk'
});


map.addSource('tramstops', {
    type: 'vector',
    url: 'mapbox://spatialg2.ac5qftfo'
  });

map.addLayer({
'id': 'tramstops',
'type': 'circle',
'source': 'tramstops',
'layout': {
'visibility': 'visible'
},
'paint': {
'circle-radius': 5,
'circle-color': 'green'
},
'source-layer': 'tram_stops_new-3hknrp'
});






map.addSource('contours', {
  type: 'vector',
  url: 'mapbox://mapbox.mapbox-terrain-v2'
});
map.addLayer({
  'id': 'contours',
  'type': 'line',
  'source': 'contours',
  'source-layer': 'contour',
  'layout': {
  'visibility': 'visible',
  'line-join': 'round',
  'line-cap': 'round'
},
'paint': {
'line-color': '#877b59',
'line-width': 1
}
});
});
 
var toggleableLayerIds = [ 'contours', 'museums' ];
 
for (var i = 0; i < toggleableLayerIds.length; i++) {
var id = toggleableLayerIds[i];
 
var link = document.createElement('a');
link.href = '#';
link.className = 'active';
link.textContent = id;
 
link.onclick = function (e) {
var clickedLayer = this.textContent;
e.preventDefault();
e.stopPropagation();
 
var visibility = map.getLayoutProperty(clickedLayer, 'visibility');
 
if (visibility === 'visible') {
map.setLayoutProperty(clickedLayer, 'visibility', 'none');
this.className = '';
} else {
this.className = 'active';
map.setLayoutProperty(clickedLayer, 'visibility', 'visible');
}
};
 
var layers = document.getElementById('menu');
layers.appendChild(link);
}

// Add map controls (pan and zoom)
map.addControl(new mapboxgl.NavigationControl());



</script>
